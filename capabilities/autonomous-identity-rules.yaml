naftiko: 1.0.0-alpha2
info:
  label: ForgeRock Autonomous Identity API — Rules
  description: 'ForgeRock Autonomous Identity API — Rules. 2 operations. Lead operation: ForgeRock List assignment rules.
    Self-contained Naftiko capability covering one Forgerock business surface.'
  tags:
  - Forgerock
  - Rules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FORGEROCK_API_KEY: FORGEROCK_API_KEY
capability:
  consumes:
  - type: http
    namespace: autonomous-identity-rules
    baseUri: https://{deployment}/autoid
    description: ForgeRock Autonomous Identity API — Rules business capability. Self-contained, no shared references.
    resources:
    - name: api-rules
      path: /api/rules
      operations:
      - name: listrules
        method: GET
        description: ForgeRock List assignment rules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: entitlement
          in: query
          type: string
          description: Filter by entitlement name
        - name: application
          in: query
          type: string
          description: Filter by application name
    - name: api-rules-ruleId
      path: /api/rules/{ruleId}
      operations:
      - name: getrule
        method: GET
        description: ForgeRock Get a rule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: ruleId
          in: path
          type: string
          description: The rule identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.FORGEROCK_API_KEY}}'
  exposes:
  - type: rest
    namespace: autonomous-identity-rules-rest
    port: 8080
    description: REST adapter for ForgeRock Autonomous Identity API — Rules. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/rules
      name: api-rules
      description: REST surface for api-rules.
      operations:
      - method: GET
        name: listrules
        description: ForgeRock List assignment rules
        call: autonomous-identity-rules.listrules
        with:
          entitlement: rest.entitlement
          application: rest.application
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/rules/{ruleid}
      name: api-rules-ruleid
      description: REST surface for api-rules-ruleId.
      operations:
      - method: GET
        name: getrule
        description: ForgeRock Get a rule
        call: autonomous-identity-rules.getrule
        with:
          ruleId: rest.ruleId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: autonomous-identity-rules-mcp
    port: 9090
    transport: http
    description: MCP adapter for ForgeRock Autonomous Identity API — Rules. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: forgerock-list-assignment-rules
      description: ForgeRock List assignment rules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: autonomous-identity-rules.listrules
      with:
        entitlement: tools.entitlement
        application: tools.application
      outputParameters:
      - type: object
        mapping: $.
    - name: forgerock-get-rule
      description: ForgeRock Get a rule
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: autonomous-identity-rules.getrule
      with:
        ruleId: tools.ruleId
      outputParameters:
      - type: object
        mapping: $.
