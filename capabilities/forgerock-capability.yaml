        description: ForgeRock Authenticate a user
        inputParameters:
        - name: authIndexType
          in: query
          type: string
          description: Type of authentication index
        - name: authIndexValue
          in: query
          type: string
          description: Name of the authentication tree or module
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
