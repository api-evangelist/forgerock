naftiko: 1.0.0-alpha2
info:
  label: ForgeRock Identity Governance API — Roles
  description: 'ForgeRock Identity Governance API — Roles. 1 operations. Lead operation: ForgeRock List governance roles.
    Self-contained Naftiko capability covering one Forgerock business surface.'
  tags:
  - Forgerock
  - Roles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FORGEROCK_API_KEY: FORGEROCK_API_KEY
capability:
  consumes:
  - type: http
    namespace: identity-governance-roles
    baseUri: https://{deployment}/iga
    description: ForgeRock Identity Governance API — Roles business capability. Self-contained, no shared references.
    resources:
    - name: governance-role
      path: /governance/role
      operations:
      - name: listgovernanceroles
        method: GET
        description: ForgeRock List governance roles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FORGEROCK_API_KEY}}'
  exposes:
  - type: rest
    namespace: identity-governance-roles-rest
    port: 8080
    description: REST adapter for ForgeRock Identity Governance API — Roles. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/governance/role
      name: governance-role
      description: REST surface for governance-role.
      operations:
      - method: GET
        name: listgovernanceroles
        description: ForgeRock List governance roles
        call: identity-governance-roles.listgovernanceroles
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: identity-governance-roles-mcp
    port: 9090
    transport: http
    description: MCP adapter for ForgeRock Identity Governance API — Roles. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: forgerock-list-governance-roles
      description: ForgeRock List governance roles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: identity-governance-roles.listgovernanceroles
      outputParameters:
      - type: object
        mapping: $.
