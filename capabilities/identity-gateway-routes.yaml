      path: /openig/api/system/objects/router-handler/routes
      operations:
      - name: listroutes
        method: GET
        description: ForgeRock List routes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: _queryFilter
          in: query
          type: string
          description: CREST query filter for routes
      - name: createroute
        method: POST
        description: ForgeRock Create a route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: openig-api-system-objects-router-handler-routes-routeId
      path: /openig/api/system/objects/router-handler/routes/{routeId}
      operations:
      - name: getroute
        method: GET
        description: ForgeRock Get a route
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: routeId
          in: path
          type: string
          description: The route identifier
