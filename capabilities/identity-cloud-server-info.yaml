naftiko: 1.0.0-alpha2
info:
  label: ForgeRock Identity Cloud REST API — Server Info
  description: 'ForgeRock Identity Cloud REST API — Server Info. 1 operations. Lead operation: ForgeRock Get server information.
    Self-contained Naftiko capability covering one Forgerock business surface.'
  tags:
  - Forgerock
  - Server Info
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FORGEROCK_API_KEY: FORGEROCK_API_KEY
capability:
  consumes:
  - type: http
    namespace: identity-cloud-server-info
    baseUri: https://{tenant}.forgeblocks.com
    description: ForgeRock Identity Cloud REST API — Server Info business capability. Self-contained, no shared references.
    resources:
    - name: am-json-realms-root-realms-realm-serverinfo-*
      path: /am/json/realms/root/realms/{realm}/serverinfo/*
      operations:
      - name: getserverinfo
        method: GET
        description: ForgeRock Get server information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FORGEROCK_API_KEY}}'
  exposes:
  - type: rest
    namespace: identity-cloud-server-info-rest
    port: 8080
    description: REST adapter for ForgeRock Identity Cloud REST API — Server Info. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/am/json/realms/root/realms/{realm}/serverinfo/
      name: am-json-realms-root-realms-realm-serverinfo
      description: REST surface for am-json-realms-root-realms-realm-serverinfo-*.
      operations:
      - method: GET
        name: getserverinfo
        description: ForgeRock Get server information
        call: identity-cloud-server-info.getserverinfo
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: identity-cloud-server-info-mcp
    port: 9090
    transport: http
    description: MCP adapter for ForgeRock Identity Cloud REST API — Server Info. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: forgerock-get-server-information
      description: ForgeRock Get server information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: identity-cloud-server-info.getserverinfo
      outputParameters:
      - type: object
        mapping: $.
