naftiko: 1.0.0-alpha2
info:
  label: ForgeRock Identity Cloud REST API — Managed Roles
  description: 'ForgeRock Identity Cloud REST API — Managed Roles. 3 operations. Lead operation: ForgeRock List managed roles.
    Self-contained Naftiko capability covering one Forgerock business surface.'
  tags:
  - Forgerock
  - Managed Roles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FORGEROCK_API_KEY: FORGEROCK_API_KEY
capability:
  consumes:
  - type: http
    namespace: identity-cloud-managed-roles
    baseUri: https://{tenant}.forgeblocks.com
    description: ForgeRock Identity Cloud REST API — Managed Roles business capability. Self-contained, no shared references.
    resources:
    - name: openidm-managed-realm}_role
      path: /openidm/managed/{realm}_role
      operations:
      - name: listmanagedroles
        method: GET
        description: ForgeRock List managed roles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createmanagedrole
        method: POST
        description: ForgeRock Create a managed role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: openidm-managed-realm}_role-roleId
      path: /openidm/managed/{realm}_role/{roleId}
      operations:
      - name: getmanagedrole
        method: GET
        description: ForgeRock Get a managed role
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: roleId
          in: path
          type: string
          description: The unique identifier of the managed role
          required: true
    authentication:
      type: bearer
      token: '{{env.FORGEROCK_API_KEY}}'
  exposes:
  - type: rest
    namespace: identity-cloud-managed-roles-rest
    port: 8080
    description: REST adapter for ForgeRock Identity Cloud REST API — Managed Roles. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/openidm/managed/realm-role
      name: openidm-managed-realm-role
      description: REST surface for openidm-managed-realm}_role.
      operations:
      - method: GET
        name: listmanagedroles
        description: ForgeRock List managed roles
        call: identity-cloud-managed-roles.listmanagedroles
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createmanagedrole
        description: ForgeRock Create a managed role
        call: identity-cloud-managed-roles.createmanagedrole
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/openidm/managed/realm-role/{roleid}
      name: openidm-managed-realm-role-roleid
      description: REST surface for openidm-managed-realm}_role-roleId.
      operations:
      - method: GET
        name: getmanagedrole
        description: ForgeRock Get a managed role
        call: identity-cloud-managed-roles.getmanagedrole
        with:
          roleId: rest.roleId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: identity-cloud-managed-roles-mcp
    port: 9090
    transport: http
    description: MCP adapter for ForgeRock Identity Cloud REST API — Managed Roles. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: forgerock-list-managed-roles
      description: ForgeRock List managed roles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: identity-cloud-managed-roles.listmanagedroles
      outputParameters:
      - type: object
        mapping: $.
    - name: forgerock-create-managed-role
      description: ForgeRock Create a managed role
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: identity-cloud-managed-roles.createmanagedrole
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: forgerock-get-managed-role
      description: ForgeRock Get a managed role
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: identity-cloud-managed-roles.getmanagedrole
      with:
        roleId: tools.roleId
      outputParameters:
      - type: object
        mapping: $.
