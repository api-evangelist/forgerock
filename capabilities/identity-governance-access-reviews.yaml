naftiko: 1.0.0-alpha2
info:
  label: ForgeRock Identity Governance API — Access Reviews
  description: 'ForgeRock Identity Governance API — Access Reviews. 3 operations. Lead operation: ForgeRock List certification
    items. Self-contained Naftiko capability covering one Forgerock business surface.'
  tags:
  - Forgerock
  - Access Reviews
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FORGEROCK_API_KEY: FORGEROCK_API_KEY
capability:
  consumes:
  - type: http
    namespace: identity-governance-access-reviews
    baseUri: https://{deployment}/iga
    description: ForgeRock Identity Governance API — Access Reviews business capability. Self-contained, no shared references.
    resources:
    - name: governance-certification-certificationId-items
      path: /governance/certification/{certificationId}/items
      operations:
      - name: listcertificationitems
        method: GET
        description: ForgeRock List certification items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: governance-certification-certificationId-items-itemId
      path: /governance/certification/{certificationId}/items/{itemId}
      operations:
      - name: getcertificationitem
        method: GET
        description: ForgeRock Get a certification item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: itemId
          in: path
          type: string
          description: The certification item identifier
          required: true
      - name: reviewcertificationitem
        method: PATCH
        description: ForgeRock Review a certification item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: itemId
          in: path
          type: string
          description: The certification item identifier
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.FORGEROCK_API_KEY}}'
  exposes:
  - type: rest
    namespace: identity-governance-access-reviews-rest
    port: 8080
    description: REST adapter for ForgeRock Identity Governance API — Access Reviews. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/governance/certification/{certificationid}/items
      name: governance-certification-certificationid-items
      description: REST surface for governance-certification-certificationId-items.
      operations:
      - method: GET
        name: listcertificationitems
        description: ForgeRock List certification items
        call: identity-governance-access-reviews.listcertificationitems
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/governance/certification/{certificationid}/items/{itemid}
      name: governance-certification-certificationid-items-itemid
      description: REST surface for governance-certification-certificationId-items-itemId.
      operations:
      - method: GET
        name: getcertificationitem
        description: ForgeRock Get a certification item
        call: identity-governance-access-reviews.getcertificationitem
        with:
          itemId: rest.itemId
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: reviewcertificationitem
        description: ForgeRock Review a certification item
        call: identity-governance-access-reviews.reviewcertificationitem
        with:
          itemId: rest.itemId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: identity-governance-access-reviews-mcp
    port: 9090
    transport: http
    description: MCP adapter for ForgeRock Identity Governance API — Access Reviews. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: forgerock-list-certification-items
      description: ForgeRock List certification items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: identity-governance-access-reviews.listcertificationitems
      outputParameters:
      - type: object
        mapping: $.
    - name: forgerock-get-certification-item
      description: ForgeRock Get a certification item
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: identity-governance-access-reviews.getcertificationitem
      with:
        itemId: tools.itemId
      outputParameters:
      - type: object
        mapping: $.
    - name: forgerock-review-certification-item
      description: ForgeRock Review a certification item
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: identity-governance-access-reviews.reviewcertificationitem
      with:
        itemId: tools.itemId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
